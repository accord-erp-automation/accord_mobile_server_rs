name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Check locked dependencies
        run: cargo check --locked

      - name: Run tests
        run: cargo test --locked

      - name: Enforce production file size
        run: |
          oversized="$(find src -type f -name '*.rs' ! -path '*/tests/*' ! -path 'src/bin/*_bench.rs' ! -name '*test*' -exec wc -l {} + | awk '$2 != "total" && $1 > 500 { print $1 " " $2 }')"
          if [ -n "$oversized" ]; then
            printf 'Production Rust files over 500 lines:\n%s\n' "$oversized"
            exit 1
          fi
